name: Bug report
description: Report something broken in 240-MP for Windows
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Most issues here are environment-specific, so the more detail on your hardware and setup, the faster it can be sorted out.
  - type: checkboxes
    id: preflight
    attributes:
      label: Before you file
      options:
        - label: I checked the [Wiki](https://github.com/anthonycaccese/240-MP/wiki) and existing issues and didn't find this.
          required: true
  - type: dropdown
    id: module
    attributes:
      label: Area / module
      description: Which part of 240-MP does this affect?
      options:
        - Local Files module
        - Plex module
        - Jellyfin module
        - YouTube module
        - Ambient Mode module
        - App shell (browsing, settings, navigation)
        - Playback (mpv hand-off, video/audio)
        - Update (in-app self-update)
        - Build (compiling from source)
        - Install (install.ps1 / zip)
        - Not sure
    validations:
      required: true
  - type: input
    id: windows_version
    attributes:
      label: Windows version
      description: Settings → System → About, e.g. "Windows 11 24H2"
    validations:
      required: true
  - type: input
    id: gpu
    attributes:
      label: GPU
      description: Helps with playback/decode issues, e.g. "NVIDIA RTX 3060" or "Intel UHD 630"
  - type: dropdown
    id: display
    attributes:
      label: Display & output
      options:
        - TV over HDMI
        - Desktop monitor
        - CRT (via HDMI-to-analog converter)
        - Other
    validations:
      required: true
  - type: dropdown
    id: install_method
    attributes:
      label: Install method
      options:
        - install.ps1 (release)
        - Release zip, extracted manually
        - Built from source
    validations:
      required: true
  - type: input
    id: mpv_version
    attributes:
      label: mpv version
      description: First line of `mpv --version`. Playback issues often trace back to this.
      placeholder: "mpv 0.xx.0"
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do, step by step?
      placeholder: |
        1. Open the Plex module
        2. Select a movie
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs. actual
      description: What did you expect to happen, and what actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: "Paste from %APPDATA%\\240-MP\\logs\\240mp.log (and %TEMP%\\240mp-mpv.log for playback issues). Rendered as code, no backticks needed."
      render: shell
