name: Hardware validation report
description: Share a working (or not-working) 240-MP setup so others can learn from it
title: "[Hardware]: "
labels: ["hardware-validation"]
body:
  - type: markdown
    attributes:
      value: |
        Validation reports across different PCs, GPUs, controllers, and TV setups are one of the most useful contributions to this project. Thank you for sharing yours!
  - type: input
    id: machine
    attributes:
      label: Machine
      description: e.g. "Beelink S12 Pro mini PC", "Custom desktop", "ThinkPad T480"
    validations:
      required: true
  - type: input
    id: windows_version
    attributes:
      label: Windows version
      placeholder: "Windows 11 24H2"
    validations:
      required: true
  - type: input
    id: gpu
    attributes:
      label: GPU
      placeholder: "Intel N100 iGPU / NVIDIA GTX 1650 / ..."
    validations:
      required: true
  - type: dropdown
    id: display
    attributes:
      label: Display & output
      options:
        - TV over HDMI
        - Desktop monitor
        - CRT (via HDMI-to-analog converter)
        - Other
    validations:
      required: true
  - type: input
    id: controller
    attributes:
      label: Controller(s) tested
      placeholder: "Xbox Series pad (USB), 8BitDo SN30 Pro (XInput mode), ..."
  - type: textarea
    id: notes
    attributes:
      label: What works / what doesn't
      description: Playback smoothness, hardware decode (check `%TEMP%\240mp-mpv.log`), controller behavior, any mpv_video_args tweaks you needed.
    validations:
      required: true
