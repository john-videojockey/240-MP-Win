name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:

  # ──────────────────────────────────────────────────────────────────────────────
  # Windows x64
  # ──────────────────────────────────────────────────────────────────────────────
  build-windows-x64:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.3'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Install OpenSSL 3 (Qt tools build)
        shell: pwsh
        run: |
          pip install aqtinstall
          python -m aqt install-tool windows desktop tools_opensslv3_x64 -O "${env:RUNNER_TEMP}\qt-tools"
          "OPENSSL_ROOT=${env:RUNNER_TEMP}\qt-tools\Tools\OpenSSLv3\Win_x64" >> $env:GITHUB_ENV

      - name: Install SDL2 (prebuilt VC devel package, pinned)
        shell: pwsh
        run: |
          $v = '2.32.10'
          Invoke-WebRequest "https://github.com/libsdl-org/SDL/releases/download/release-$v/SDL2-devel-$v-VC.zip" -OutFile "${env:RUNNER_TEMP}\sdl2.zip"
          Expand-Archive "${env:RUNNER_TEMP}\sdl2.zip" -DestinationPath "${env:RUNNER_TEMP}\sdl2"
          "SDL2_PREFIX=${env:RUNNER_TEMP}\sdl2\SDL2-$v" >> $env:GITHUB_ENV

      # The GitHub windows runner image no longer ships VS 2022, so a pinned
      # "Visual Studio 17 2022" generator fails with "could not find any instance
      # of Visual Studio". Set up MSVC and build with Ninja instead — the same way
      # the app builds locally, and version-agnostic across runner image changes.
      - name: Set up MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        shell: pwsh
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="${env:QT_ROOT_DIR};${env:SDL2_PREFIX}" `
            -DOPENSSL_ROOT_DIR="${env:OPENSSL_ROOT}" `
            -DAPP_VERSION="${{ github.ref_name }}"

      - name: Build
        run: cmake --build build --parallel

      - name: Stage install
        run: cmake --install build --prefix "${{ github.workspace }}/stage"

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          & "${env:QT_ROOT_DIR}\bin\windeployqt.exe" --release --qmldir "${{ github.workspace }}" "${{ github.workspace }}\stage\240mp.exe"

      - name: Verify staged app launches
        shell: pwsh
        run: |
          # The exe must resolve every DLL and load Main.qml from the stage
          # alone. It logs to DATA_ROOT and keeps running; alive after 10 s
          # with a QML-routing log line means the runtime is complete.
          $env:DATA_ROOT = "${env:RUNNER_TEMP}\240mp-data"
          $p = Start-Process "${{ github.workspace }}\stage\240mp.exe" -PassThru
          Start-Sleep -Seconds 10
          $alive = -not $p.HasExited
          if ($alive) { Stop-Process -Id $p.Id -Force }
          Get-Content "${env:DATA_ROOT}\logs\240mp.log" -ErrorAction SilentlyContinue
          if (-not $alive) { throw 'staged 240mp.exe exited during smoke test' }

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ github.workspace }}\stage\*" `
            -DestinationPath "240-MP-${{ github.ref_name }}-windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: zip-windows-x64
          path: "240-MP-*-windows-x64.zip"
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────────
  # Publish GitHub Release
  # ──────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-windows-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Download artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: artifacts

      # Basenames only ("<sha256>  <file>") so clients can verify a single line
      # next to the downloaded asset. install.ps1 and the in-app updater both
      # verify against this file.
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum zip-windows-x64/*.zip | sed 's|  .*/|  |' > SHA256SUMS

      # Release body = this version's CHANGELOG section (if present) followed by
      # the standard download / install / update footer.
      - name: Build release notes
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v v="## [$ver]" 'index($0,v)==1{f=1;next} f&&/^## \[/{exit} f{print}' CHANGELOG.md > cl.md || true
          : > RELEASE_NOTES.md
          if [ -s cl.md ]; then { echo "## What's New"; echo; cat cl.md; echo; echo '---'; echo; } >> RELEASE_NOTES.md; fi
          {
            printf '### Downloads:\n\n| Platform | File |\n|---|---|\n'
            printf '| Windows 10/11 (x64) | `240-MP-%s-windows-x64.zip` |\n\n' "$GITHUB_REF_NAME"
            printf '### Install:\n\n```powershell\nirm https://github.com/%s/releases/latest/download/install.ps1 | iex\n```\n\n' "$GITHUB_REPOSITORY"
            printf '…or download the zip, extract anywhere, and run `240mp.exe` (needs mpv on PATH or in an `mpv\\` subfolder — see [INSTALL.md](INSTALL.md)).\n\n'
            printf '### Update:\n\nUse **Settings → Update** inside the app, or re-run the install one-liner.\n'
          } >> RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "240-MP ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            artifacts/zip-windows-x64/*.zip
            artifacts/SHA256SUMS
            scripts/install.ps1
          body_path: RELEASE_NOTES.md
