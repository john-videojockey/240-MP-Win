name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:

  # ──────────────────────────────────────────────────────────────────────────────
  # macOS arm64 (Apple Silicon)
  # ──────────────────────────────────────────────────────────────────────────────
  build-macos-arm64:
    name: macOS arm64
    # Pinned: macos-latest now resolves to the macOS 26 image, whose SDK dropped
    # the AGL framework that Qt 6.7 still links ("ld: framework 'AGL' not
    # found"). Unpin only after bumping Qt to a release that supports the new
    # SDK (6.9.3+).
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          host: mac
          target: desktop
          arch: clang_64
          cache: true

      - name: Build SDL2 from source (pinned — Homebrew's sdl2 is now the sdl2-compat/SDL3 shim)
        run: |
          SDL2_VERSION=2.32.10
          SRC="${RUNNER_TEMP}/SDL2-src"
          BUILD="${RUNNER_TEMP}/SDL2-build"
          git clone --depth 1 --branch "release-${SDL2_VERSION}" \
            https://github.com/libsdl-org/SDL "$SRC"
          cmake -S "$SRC" -B "$BUILD" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_INSTALL_PREFIX="${RUNNER_TEMP}/sdl2-install" \
            -DSDL_SHARED=ON -DSDL_STATIC=OFF -DSDL_TEST=OFF
          cmake --build "$BUILD" --parallel
          cmake --install "$BUILD"
          echo "SDL2_PREFIX=${RUNNER_TEMP}/sdl2-install" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR};${SDL2_PREFIX}" \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/install" \
            -DAPP_VERSION="${{ github.ref_name }}"

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build

      - name: Deploy Qt frameworks
        run: |
          APP="${GITHUB_WORKSPACE}/install/240mp.app"
          "${QT_ROOT_DIR}/bin/macdeployqt" "$APP" -qmldir="${GITHUB_WORKSPACE}" -verbose=2

      - name: Verify SDL bundling
        run: |
          FW="${GITHUB_WORKSPACE}/install/240mp.app/Contents/Frameworks"
          test -f "$FW/libSDL2-2.0.0.dylib" || { echo "SDL2 not bundled"; exit 1; }
          ! ls "$FW" | grep -qi sdl3 || { echo "SDL3 leaked into bundle"; exit 1; }

      - name: Import signing certificate
        env:
          CERT_P12: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASS=$(openssl rand -hex 16)
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

      - name: Sign app
        run: |
          APP="${GITHUB_WORKSPACE}/install/240mp.app"
          IDENTITY="Developer ID Application"
          find "$APP/Contents/Frameworks" \( -name "*.dylib" -o -name "*.framework" \) \
            -exec codesign --force --options runtime --sign "$IDENTITY" {} \;
          codesign --force --deep --options runtime --sign "$IDENTITY" "$APP"
          codesign --verify --deep --strict "$APP"

      - name: Create DMG
        run: |
          # Standard installer layout: the app plus an /Applications symlink so
          # users drag one onto the other inside the DMG window. Also avoids a
          # Finder quirk where dragging from a bare single-app image to
          # /Applications could produce an alias instead of a copy.
          STAGE="${RUNNER_TEMP}/dmg-stage"
          mkdir -p "$STAGE"
          ditto "${GITHUB_WORKSPACE}/install/240mp.app" "$STAGE/240mp.app"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create \
            -volname "240-MP" \
            -srcfolder "$STAGE" \
            -ov -format UDZO \
            "240-MP-${{ github.ref_name }}-macOS-arm64.dmg"

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG="240-MP-${{ github.ref_name }}-macOS-arm64.dmg"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"

      - name: Remove signing keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db"

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: dmg-arm64
          path: "240-MP-*-macOS-arm64.dmg"
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────────
  # Linux arm64 — targets Raspberry Pi OS Trixie (Debian 13)
  # Uses GitHub's native arm64 runner; no QEMU needed.
  # ──────────────────────────────────────────────────────────────────────────────
  build-linux-arm64:
    name: Linux arm64
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install build dependencies
        run: |
          # The runner image ships Microsoft apt repos (azure-cli, prod) that
          # intermittently serve broken signatures and fail `apt-get update`.
          # This build doesn't need them, so drop them first.
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.* /etc/apt/sources.list.d/azure-cli.*
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            qt6-base-dev \
            qt6-declarative-dev \
            libqt6svg6 \
            qt6-svg-dev \
            qml6-module-qtquick \
            qml6-module-qtquick-controls \
            qml6-module-qtquick-window \
            libdrm-dev \
            libssl-dev \
            libsdl2-dev

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/install/usr/local" \
            -DAPP_VERSION="${{ github.ref_name }}"

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build

      - name: Create tarball
        run: |
          cd "${GITHUB_WORKSPACE}/install"
          tar -czf "${GITHUB_WORKSPACE}/240-MP-${{ github.ref_name }}-linux-arm64.tar.gz" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: tarball-linux-arm64
          path: "240-MP-*-linux-arm64.tar.gz"
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────────
  # Publish GitHub Release
  # ──────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-macos-arm64, build-linux-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Download artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: artifacts

      # Basenames only ("<sha256>  <file>") so clients can `sha256sum -c` a
      # single line next to the downloaded asset. The in-app updater and the
      # RPi launcher's staged-update apply both verify against this file.
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum dmg-arm64/*.dmg tarball-linux-arm64/*.tar.gz \
            | sed 's|  .*/|  |' > SHA256SUMS

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "240-MP ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            artifacts/dmg-arm64/*.dmg
            artifacts/tarball-linux-arm64/*.tar.gz
            artifacts/SHA256SUMS
            scripts/install.sh
          body: |
            ### Downloads:

            | Platform | File |
            |---|---|
            | Raspberry Pi OS Trixie (arm64) | `240-MP-${{ github.ref_name }}-linux-arm64.tar.gz` |
            | macOS (Apple Silicon) | `240-MP-${{ github.ref_name }}-macOS-arm64.dmg` |

            ### Install Instructions:

            - Raspberry Pi OS Trixie (arm64): [Instructions](INSTALL.md#on-a-raspberry-pi)
            - macOS (Apple Silicon): Download the `.dmg`, open and move 240mp.app to your applications folder

            ### Update Instructions:

            - Raspberry Pi OS Trixie (arm64): [Instructions](INSTALL.md#update)
            - macOS (Apple Silicon): Download the `.dmg`, open and move 240mp.app to your applications folder
